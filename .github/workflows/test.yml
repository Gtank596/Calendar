name: Quality Foundation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Static checks, unit/regression tests, browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node 18 (matches the verified local toolchain)
        uses: actions/setup-node@v4
        with:
          # Pinned deliberately: the dev machine runs Node 18, and the pinned
          # Playwright 1.49.1 hangs silently under Node 24 (first CI run sat
          # 29 minutes with no output). Bump Node and Playwright together.
          node-version: "18"
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Syntax check (first-party JavaScript)
        run: npm run check:syntax

      - name: Duplicate HTML id check
        run: npm run check:ids

      - name: Unit + regression tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright browser tests
        run: npm run test:e2e
        timeout-minutes: 12

      - name: Upload Playwright artifacts (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
